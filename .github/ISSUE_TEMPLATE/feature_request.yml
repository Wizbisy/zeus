name: Feature Request
description: Suggest a new heuristic, kill gate, or idea for Zeus
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature or detection heuristic for Zeus!
  - type: textarea
    id: vulnerability
    attributes:
      label: Vulnerability Description
      description: A clear and concise description of the threat model or bug class this feature targets. E.g., "Attackers can bypass gl.eq_principle.strict_eq() by doing X..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution (Heuristic / Kill Gate)
      description: A clear and concise description of the new heuristic (for the detector) or kill gate (for the critic) you want to add.
    validations:
      required: true
  - type: textarea
    id: example_code
    attributes:
      label: Example Vulnerable GenLayer Contract
      description: Provide a small Python snippet using `gl.Contract` that demonstrates the vulnerability.
      value: |
        ```python
        @gl.public.write
        def vulnerable_method(self, user_input: str):
            pass
        ```
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
